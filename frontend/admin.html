<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Cardápio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Login screen -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 w-full max-w-sm space-y-6">
      <h1 class="text-3xl font-display text-amber-400 tracking-widest text-center">ADMIN</h1>
      <input id="password-input" type="password" placeholder="Senha" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-amber-400" />
      <p id="login-error" class="text-red-400 text-sm hidden">Senha incorreta.</p>
      <button id="btn-login" class="w-full bg-amber-400 text-zinc-950 font-bold py-3 rounded-lg hover:bg-amber-300 transition">Entrar</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
      <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-display text-amber-400 tracking-widest">PAINEL ADMIN</h1>
        <div class="flex gap-3">
          <a href="/" class="text-zinc-400 hover:text-white text-sm transition">Ver cardápio</a>
          <button id="btn-logout" class="text-zinc-400 hover:text-white text-sm transition">Sair</button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 space-y-8">

      <!-- Formulário novo item -->
      <section class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 space-y-4">
        <h2 id="form-title" class="text-lg font-bold">Novo item</h2>
        <form id="item-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <input type="hidden" id="edit-id" />
          <input id="f-name" name="name" type="text" placeholder="Nome *" required class="input-field" />
          <input id="f-price" name="price" type="number" step="0.01" min="0" placeholder="Preço *" required class="input-field" />
          <input id="f-category" name="category" type="text" placeholder="Categoria" class="input-field" />
          <div class="flex items-center gap-2">
            <input id="f-available" name="available" type="checkbox" checked class="w-4 h-4 accent-amber-400" />
            <label for="f-available" class="text-sm">Disponível</label>
          </div>
          <textarea id="f-description" name="description" placeholder="Descrição" rows="2" class="input-field sm:col-span-2"></textarea>
          <div class="sm:col-span-2">
            <label class="text-sm text-zinc-400">Imagem</label>
            <input id="f-image" name="image" type="file" accept="image/*" class="mt-1 block text-sm text-zinc-400" />
          </div>
          <div class="sm:col-span-2 flex gap-3">
            <button type="submit" class="bg-amber-400 text-zinc-950 font-bold px-6 py-2 rounded-lg hover:bg-amber-300 transition">Salvar</button>
            <button type="button" id="btn-cancel" class="hidden text-zinc-400 hover:text-white transition">Cancelar</button>
          </div>
        </form>
      </section>

      <!-- Lista de itens -->
      <section>
        <h2 class="text-lg font-bold mb-4">Itens cadastrados</h2>
        <div id="admin-items" class="space-y-3"></div>
      </section>
    </main>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
